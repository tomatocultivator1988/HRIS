<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Force Password Change - Real API</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
        pre { background: #f4f4f4; padding: 10px; border-radius: 5px; overflow-x: auto; }
        .success { color: green; }
        .error { color: red; }
        .warning { color: orange; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>
    <h1>Test Force Password Change - Real API Call</h1>
    
    <div>
        <label>Email: <input type="email" id="email" value="pass@gmail.com" style="width: 300px; padding: 5px;"></label><br><br>
        <label>Password: <input type="password" id="password" value="pass09123456789" style="width: 300px; padding: 5px;"></label><br><br>
        <button onclick="testLogin()">Test Login</button>
        <button onclick="clearOutput()">Clear Output</button>
    </div>
    
    <div id="output"></div>
    
    <script>
        async function testLogin() {
            const output = document.getElementById('output');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            output.innerHTML = '<h2>Testing Login...</h2>';
            output.innerHTML += '<p>Email: ' + email + '</p>';
            output.innerHTML += '<p>Password: ' + password + '</p>';
            
            try {
                // Step 1: Call login API
                output.innerHTML += '<h3>Step 1: Calling Login API</h3>';
                
                const response = await fetch('http://localhost/HRIS/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password
                    })
                });
                
                const data = await response.json();
                
                output.innerHTML += '<p>HTTP Status: ' + response.status + '</p>';
                output.innerHTML += '<h4>Raw API Response:</h4>';
                output.innerHTML += '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
                
                if (!data.success) {
                    output.innerHTML += '<p class="error">❌ Login failed: ' + (data.message || 'Unknown error') + '</p>';
                    return;
                }
                
                output.innerHTML += '<p class="success">✅ Login successful!</p>';
                
                // Step 2: Extract user data
                output.innerHTML += '<h3>Step 2: Extract User Data</h3>';
                
                const payload = data.data || data;
                const user = payload.user;
                const token = payload.access_token;
                
                output.innerHTML += '<h4>User Data:</h4>';
                output.innerHTML += '<pre>' + JSON.stringify(user, null, 2) + '</pre>';
                
                // Step 3: Check force password change
                output.innerHTML += '<h3>Step 3: Check Force Password Change</h3>';
                
                output.innerHTML += '<p>user.role: <strong>' + user.role + '</strong></p>';
                output.innerHTML += '<p>user.force_password_change: <strong>' + user.force_password_change + '</strong></p>';
                
                const isEmployee = user.role === 'employee';
                const needsPasswordChange = user.force_password_change === true;
                
                output.innerHTML += '<p>Is employee: <strong>' + isEmployee + '</strong></p>';
                output.innerHTML += '<p>Needs password change: <strong>' + needsPasswordChange + '</strong></p>';
                
                // Step 4: Determine redirect
                output.innerHTML += '<h3>Step 4: Determine Redirect URL</h3>';
                
                let redirectUrl;
                let shouldForceChange = false;
                
                if (isEmployee && needsPasswordChange) {
                    shouldForceChange = true;
                    redirectUrl = '/HRIS/password/change';
                    output.innerHTML += '<p class="success">✅ Condition MATCHES! Should force password change.</p>';
                } else {
                    redirectUrl = user.role === 'admin' ? '/HRIS/dashboard/admin' : '/HRIS/dashboard/employee';
                    output.innerHTML += '<p class="warning">⚠️ Condition DOES NOT MATCH. Normal redirect.</p>';
                    
                    if (!isEmployee) {
                        output.innerHTML += '<p class="error">Reason: User is not an employee (role: ' + user.role + ')</p>';
                    }
                    if (!needsPasswordChange) {
                        output.innerHTML += '<p class="error">Reason: force_password_change is not true (value: ' + user.force_password_change + ')</p>';
                    }
                }
                
                output.innerHTML += '<p>Redirect URL: <strong>' + redirectUrl + '</strong></p>';
                
                // Step 5: Test redirect
                output.innerHTML += '<h3>Step 5: Test Redirect</h3>';
                output.innerHTML += '<button onclick="window.location.href=\'' + redirectUrl + '\'">Click to Redirect to: ' + redirectUrl + '</button>';
                
                // Auto redirect countdown
                output.innerHTML += '<p id="countdown">Auto-redirecting in 10 seconds...</p>';
                
                let countdown = 10;
                const interval = setInterval(() => {
                    countdown--;
                    const countdownEl = document.getElementById('countdown');
                    if (countdownEl) {
                        countdownEl.textContent = 'Auto-redirecting in ' + countdown + ' seconds...';
                    }
                    
                    if (countdown <= 0) {
                        clearInterval(interval);
                        console.log('Redirecting to:', redirectUrl);
                        window.location.href = redirectUrl;
                    }
                }, 1000);
                
            } catch (error) {
                output.innerHTML += '<p class="error">❌ Error: ' + error.message + '</p>';
                console.error('Test error:', error);
            }
        }
        
        function clearOutput() {
            document.getElementById('output').innerHTML = '';
        }
    </script>
</body>
</html>
